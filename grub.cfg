# BlueyOS GRUB Configuration
# "It's a big day!" - Bluey Heeler
#
# Bluey and all related characters are trademarks of Ludo Studio Pty Ltd,
# licensed by BBC Studios. BlueyOS is an unofficial fan/research project.

serial --unit=0 --speed=115200
terminal_output --append serial

set timeout=1
set default=0

menuentry "BlueyOS - It's a big day!" {
    set gfxpayload=text
    multiboot /boot/blueyos.elf root=/dev/disk0s2 rootfstype=blueyfs
    boot
}

menuentry "BlueyOS - Safe Mode (No Rules, No Fun)" {
    set gfxpayload=text
    multiboot /boot/blueyos.elf safe root=/dev/disk0s2 rootfstype=blueyfs
    boot
}

menuentry "BlueyOS - Single User (Claw)" {
    # Reset any persistent/one-shot boot override so next reboot returns to normal boot.
    set saved_entry=0
    save_env saved_entry
    set next_entry=
    save_env next_entry
    set gfxpayload=text
    multiboot /boot/blueyos.elf safe root=/dev/disk0s2 rootfstype=blueyfs init=/sbin/claw claw.single=1 claw.target=single-user
    boot
}

menuentry "Reboot" {
    reboot
}
